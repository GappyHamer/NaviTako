name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (lib/oracle)
        run: npm test

      # Redis(Phase 2)는 env 미설정 시 자동 비활성화되므로 시크릿 없이 빌드 가능
      - name: Production build
        run: npm run build
